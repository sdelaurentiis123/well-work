name: p2-walrus
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      # PyTorch + CUDA 12.1 wheels (works with cuda12.0 module on Ginsburg)
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch==2.4.0
      - torchvision==0.19.0
      # Walrus + Well runtime stack
      - hydra-core>=1.3
      - omegaconf
      - pytorch-lightning>=2.0
      - einops
      - h5py
      - huggingface_hub
      - the_well
      # Plotting + analysis
      - numpy
      - scipy
      - matplotlib
      - tqdm
